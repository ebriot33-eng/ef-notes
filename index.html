<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EF Meeting Notes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }
  .header { background: #1a1a2e; color: white; padding: 1.25rem 1.5rem; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header p { font-size: 13px; opacity: 0.6; margin-top: 2px; }
  .container { padding: 1.25rem; max-width: 600px; margin: 0 auto; }
  .card { background: white; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid #e8e8e8; }
  label { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  input[type="text"] { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 15px; outline: none; background: #fafafa; }
  input[type="text"]:focus { border-color: #1a1a2e; background: white; }
  .record-btn { width: 100%; padding: 1rem; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
  .record-btn.idle { background: #1a1a2e; color: white; }
  .record-btn.recording { background: #e74c3c; color: white; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
  .record-dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; }
  .transcript-box { width: 100%; min-height: 120px; border: 1px solid #ddd; border-radius: 8px; padding: 12px; font-size: 15px; line-height: 1.6; background: #fafafa; color: #333; resize: vertical; font-family: inherit; border: none; outline: none; }
  .transcript-wrapper { border: 1px solid #ddd; border-radius: 8px; background: #fafafa; overflow: hidden; }
  .transcript-wrapper.editable { border-color: #1a1a2e; background: white; }
  .transcript-toolbar { display: flex; justify-content: flex-end; padding: 4px 8px; border-top: 1px solid #eee; background: #f5f5f5; }
  .edit-btn { font-size: 12px; color: #1a1a2e; background: none; border: none; cursor: pointer; padding: 4px 8px; font-weight: 600; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 14px; font-weight: 500; cursor: pointer; color: #333; }
  .btn:active { background: #f0f0f0; }
  .btn.primary { background: #1a1a2e; color: white; border-color: #1a1a2e; }
  .btn.danger { color: #e74c3c; border-color: #e74c3c; }
  .status { font-size: 13px; color: #888; text-align: center; margin-top: 8px; min-height: 18px; }
  .status.error { color: #e74c3c; }
  .status.success { color: #27ae60; }
  .notes-list { display: flex; flex-direction: column; gap: 10px; }
  .note-item { background: white; border-radius: 10px; padding: 1rem; border: 1px solid #e8e8e8; }
  .note-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .note-founder { font-weight: 600; font-size: 14px; }
  .note-company { font-size: 12px; color: #888; }
  .note-time { font-size: 11px; color: #bbb; }
  .note-text { font-size: 14px; color: #444; line-height: 1.5; }
  .empty-state { text-align: center; color: #bbb; font-size: 14px; padding: 2rem 0; }
  .section-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .unsupported { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px; font-size: 14px; color: #856404; text-align: center; margin-bottom: 1rem; }
</style>
</head>
<body>

<div class="header">
  <h1>EF Meeting Notes</h1>
  <p>Voice → Google Sheets</p>
</div>

<div class="container">

  <div id="unsupported-msg" class="unsupported" style="display:none;">
    Voice recording requires Chrome on Android or Safari on iPhone. Please open this page in one of those browsers.
  </div>

  <div class="card">
    <div style="display:flex; gap:10px; margin-bottom:1rem;">
      <div style="flex:1">
        <label>Founder name</label>
        <input type="text" id="founder" placeholder="e.g. Sarah Chen" />
      </div>
      <div style="flex:1">
        <label>Company name</label>
        <input type="text" id="company" placeholder="e.g. Acme AI" />
      </div>
    </div>

    <div style="margin-bottom:1rem;">
      <label>Meeting date</label>
      <input type="date" id="meetingDate" style="width:100%; border:1px solid #ddd; border-radius:8px; padding:10px 12px; font-size:15px; outline:none; background:#fafafa;" />
    </div>

    <label>Notes</label>
    <div class="transcript-wrapper" id="transcript-wrapper">
      <textarea id="transcript" class="transcript-box" rows="5" readonly>Tap record and start speaking…</textarea>
      <div class="transcript-toolbar">
        <button class="edit-btn" onclick="enableEdit()">✏️ Edit transcript</button>
      </div>
    </div>

    <div style="margin-top:10px;">
      <button id="record-btn" class="record-btn idle" onclick="toggleRecording()">
        <span class="record-dot"></span>
        <span id="record-label">Hold to Record</span>
      </button>
      <div id="status" class="status"></div>
    </div>

    <div class="btn-row">
      <button class="btn danger" onclick="clearNote()">Clear</button>
      <button class="btn primary" onclick="saveNote()">Save Note →</button>
    </div>
  </div>

  <div class="section-title">Saved notes</div>
  <div id="notes-list" class="notes-list">
    <div class="empty-state">No notes yet — save your first one above.</div>
  </div>

</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxibFgMKks2kcJyeEMbahnXnXWc9pgIAebTkxULcSAGS70B9BlCN3mgGjW2epuo0xyskA/exec";

let recognition = null;
let isRecording = false;
let fullTranscript = "";

function enableEdit() {
  const box = document.getElementById("transcript");
  const wrapper = document.getElementById("transcript-wrapper");
  box.readOnly = false;
  box.focus();
  wrapper.classList.add("editable");
  const len = box.value.length;
  box.setSelectionRange(len, len);
}

function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById("unsupported-msg").style.display = "block";
    document.getElementById("record-btn").disabled = true;
    return false;
  }
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = "en-GB";

  recognition.onresult = (e) => {
    let interim = "";
    let final = "";
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript + " ";
      else interim += e.results[i][0].transcript;
    }
    fullTranscript = final;
    const box = document.getElementById("transcript");
    box.value = (final + interim) || "";
  };

  recognition.onerror = (e) => {
    setStatus("Mic error: " + e.error, "error");
    stopRecording();
  };

  recognition.onend = () => {
    if (isRecording) recognition.start();
  };

  return true;
}

function toggleRecording() {
  if (!recognition && !initSpeech()) return;
  isRecording ? stopRecording() : startRecording();
}

function startRecording() {
  isRecording = true;
  fullTranscript = "";
  const box = document.getElementById("transcript");
  box.value = "";
  box.readOnly = true;
  document.getElementById("transcript-wrapper").classList.remove("editable");
  document.getElementById("record-btn").className = "record-btn recording";
  document.getElementById("record-label").textContent = "Recording… tap to stop";
  setStatus("Listening…");
  recognition.start();
}

function stopRecording() {
  isRecording = false;
  recognition.stop();
  document.getElementById("record-btn").className = "record-btn idle";
  document.getElementById("record-label").textContent = "Hold to Record";
  setStatus("Done. Tap '✏️ Edit transcript' to make changes, or save.");
}

function clearNote() {
  fullTranscript = "";
  const box = document.getElementById("transcript");
  box.value = "Tap record and start speaking…";
  box.readOnly = true;
  document.getElementById("transcript-wrapper").classList.remove("editable");
  document.getElementById("founder").value = "";
  document.getElementById("company").value = "";
  document.getElementById("meetingDate").value = today();
  setStatus("");
}

async function saveNote() {
  const note = document.getElementById("transcript").value;
  const founder = document.getElementById("founder").value.trim();
  const company = document.getElementById("company").value.trim();
  const meetingDate = document.getElementById("meetingDate").value;

  if (!note || note === "Tap record and start speaking…") {
    setStatus("Nothing to save yet.", "error"); return;
  }

  setStatus("Saving…");

  const entry = { founder, company, meetingDate, note, time: new Date().toLocaleString("en-GB") };

  const params = new URLSearchParams({ founder: entry.founder, company: entry.company, meetingDate: entry.meetingDate, note: entry.note });

  try {
    await fetch(APPS_SCRIPT_URL + "?" + params.toString(), { method: "GET", mode: "no-cors" });
  } catch (err) {
    setStatus("Saved locally (sheet sync failed)", "error");
  }

  addNoteToUI(entry);
  saveToLocalStorage(entry);
  setStatus("Saved!", "success");
  setTimeout(clearNote, 1500);
}

function addNoteToUI(entry) {
  const list = document.getElementById("notes-list");
  const empty = list.querySelector(".empty-state");
  if (empty) empty.remove();

  const div = document.createElement("div");
  div.className = "note-item";
  div.innerHTML = `
    <div class="note-meta">
      <div>
        <div class="note-founder">${entry.founder || "Unknown founder"}</div>
        <div class="note-company">${entry.company || ""}</div>
      </div>
      <div class="note-time">${entry.time}</div>
    </div>
    <div class="note-text">${entry.note}</div>
  `;
  list.prepend(div);
}

function saveToLocalStorage(entry) {
  const existing = JSON.parse(localStorage.getItem("ef_notes") || "[]");
  existing.unshift(entry);
  localStorage.setItem("ef_notes", JSON.stringify(existing));
}

function loadFromLocalStorage() {
  const notes = JSON.parse(localStorage.getItem("ef_notes") || "[]");
  notes.forEach(addNoteToUI);
}

function setStatus(msg, type = "") {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status" + (type ? " " + type : "");
}

function today() { return new Date().toISOString().split('T')[0]; }
document.getElementById('meetingDate').value = today();
loadFromLocalStorage();
</script>
</body>
</html>
